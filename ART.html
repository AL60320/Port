<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Test</title>
</head>

<body style="margin:0; overflow:auto;">

<!-- Big scrollable world -->
<div style="
  position: relative;
  width: 200vw;
  height: 200dvh;
  background: #111;
">

  <!-- Your image -->
  <img 
    src="Images/TestImage.png"
    alt="test"
    style="
      position: absolute;

      /* CHANGE THESE */
      left: 10%;
      top: 10%;

      /* Responsive size */
      width: clamp(50px, 10vw, 120px);

      /* Center it nicely */
      transform: translate(-50%, -50%);
    "
  >

</div>

</body>
</html>

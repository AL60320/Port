<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Expereince</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="bg"></div>
    <div class="main-wrapper">
        <section class="main" style="height: 100vh;">
          <nav class="navbar prevent-select">
            <a href="index.html" data-short="HOME">PROJECTS</a>
            <a href="3d.html" data-short="3D" class="current">3D</a>
            <a href="art.html" data-short="ART">ART</a>
            <a href="hardware.html" data-short="HW">HARDWARE</a>
            <a href="games.html" data-short="GAMES">GAMES</a>
        </nav>
        <div class="NavRect" ></div>
        <div class="FadeFromBlackRect" ></div>
      </section>  


        <img 
            src="Images/TestImage.png"
            alt="test"
            style="
                position: absolute;
                left: 50%;
                top: 25%;
                width: clamp(510px, 10vw, 120px);
                transform: translate(-50%, -50%);
                z-index: 150;
            "
        >


    </div>





        
    
    <script>
         gsap.set(".navbar a", { opacity: 0, y: -60 });

        if (window.innerWidth < 768) {
        document.querySelectorAll('.navbar a').forEach(link => {
            const short = link.getAttribute('data-short');
            if (short) link.textContent = short;
        });
        }


        gsap.to(".FadeFromBlackRect", {
            opacity: 0,
            duration: 1.7,
            ease: "power2.inOut"
        });
        gsap.to(".NavRect", {
            top: "0vh",
            padding: "3vh 14vw",
            opacity: 1,
            duration: 0.9,
            ease: "power2.inOut"
        });
        setTimeout(startseqence, 500);
                gsap.to(".navbar a", { opacity: 1, y: -17, duration: 0.5, stagger: 0.1, delay: 0.7 });

        function startseqence(){
            gsap.to(".navbar", {
                opacity: 1,
                duration: 2
            });
        }


    </script>



</body>
</html>

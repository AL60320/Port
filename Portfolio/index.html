<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthony Long</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg"></div>
  <div class="corner top-left prevent-select">+</div>
  <div class="corner top-right prevent-select">×</div>
  <div class="corner bottom-left prevent-select">×</div>
  <div class="corner bottom-right prevent-select" style="color: #ffd54c71;">+</div>
  <img class="icon icon-pos prevent-select" src='Images/scroll.png' alt="scrollimage">
  <div class="rect" ></div>

  <div class="splash-wrapper">
    <h1 class="prevent-select">Anthony Long</h1>
    <div style="text-align: center;">
      <p id="tester" class="prevent-select">Function Follows Simplicity</p>
    </div>
  </div>

  <div class="main-wrapper">
        <section class="main" style="height: 100vh;">
          <nav class="navbar prevent-select">
            <a href="index.html" data-short="HOME" class="current">PROJECTS</a>
            <a href="3d.html" data-short="3D">3D</a>
            <a href="art.html" data-short="ART">ART</a>
            <a href="hardware.html" data-short="HW">HARDWARE</a>
            <a href="games.html" data-short="GAMES">GAMES</a>
        </nav>
        <div class="NavRect" ></div>
      </section>  

      <div id="HookText">
        <!-- Designer Splash vvv-->
        <img           
          src="Images/Designer.png"
          style="
            position: absolute;

            left: 50%;
            top: 35%;

            width: clamp(120px, 100vmin, 900px);

            transform: translate(-50%, -50%);
            z-index: 150;
          "
        >

        <!-- builder Splash vvv-->
        <img           
          src="Images/Builder.png"
          style="
            position: absolute;

            left: 55%;
            top: 90%;

            width: clamp(110px, 85vmin, 900px);

            transform: translate(-50%, -50%);
            z-index: 150;
          "
        >


        <img           
          src="Images/3dProduct.png"
          style="
            position: absolute;

            left: 40%;
            top: 19%;

            width: clamp(110px, 85vmin, 900px);

            transform: translate(-50%, -50%);
            z-index: 149;
          "
        >








      </div>












    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    if (window.innerWidth < 768) {
      document.querySelectorAll('.navbar a').forEach(link => {
        const short = link.getAttribute('data-short');
        if (short) link.textContent = short;
      });
    }


    const myTimeout = setTimeout(MouseCanMove, 2300);
    var TextTest = "Form Follows Simplicity";
    var Cursor = "";
    var slicei = 27;
    let state = "intro";
    let scrolled = false;
    gsap.set("#HookText img", { opacity: 0, y: 45 });
    gsap.set(".navbar a", { opacity: 0, y: -60 });
    /* gsap.set(".NavRect", { opacity: 0 }); */

    setInterval(function() {
      result = TextTest.slice(0, slicei);
      document.getElementById("tester").innerHTML = ">// " + result + Cursor;
      if (state === "delete1") {
        if (slicei > 0) {
          slicei -= 1;
        } else {
          state = "wait";
          setTimeout(retypeit, 2200);
        }
      }
      if (state === "retype") {
        TextTest = "Function Follows Creativity";
        if (slicei < 27) {
          slicei += 1;
        } else {
          state = "done";
        }
      }
    }, 70);

    setInterval(function() {
      if (Cursor === "█" && state != "retype" && state != "delete1") {
        Cursor = " ";
      } else {
        Cursor = "█";
      }
    }, 1000);

    function retypeit() {
      setTimeout(fadein, 2000);
      state = "retype";
    }

    function fadein() {
      if (scrolled === false){
        gsap.to(".icon", {
            opacity: 1,
            duration: 2
        });
      }
        
    }

    function MouseCanMove() {  /*allow input stuff after delete*/
        if (state === "intro") {
            Cursor = "█";
            state = "delete1";
        }
        document.addEventListener("mousemove", function() {
            if (state === "intro") {
            Cursor = "█";
            state = "delete1";
            }
        });
    }

     let touchStartY = 0;


    window.addEventListener('wheel', function(e) {
      gsap.to("#HookText img", {
        opacity: 1,
        y: 0,
        duration: 1,
        stagger: 0.1,
        delay: 1.24,
        ease: "power3.Out"

      });
      e.preventDefault();
      if (scrolled) return;
      scrolled = true;
      
      gsap.to(".rect", {
        padding: "200vh 0vw",
        left: "2vw",
        right: "2vw",
        opacity: 0.83,
        borderColor: "rgba(255,255,255,0)",
        duration: 1,
        backgroundColor: "rgba(0, 0, 0, 0.873)",
        ease: "power3.inOut"
      });
      gsap.to(".icon", { opacity: 0, duration: 0.5 });
      gsap.to(".NavRect", { top: "0vh", padding: "3vh 14vw", opacity: 1, duration: 1.3 });
      gsap.to(".navbar a", { opacity: 1, y: -7, duration: 0.5, stagger: 0.1, delay: 0.7 });
      gsap.to(".splash-wrapper", {
        y: -window.innerHeight,
        duration: 2,
        ease: "power2.inOut",
        onComplete: function() {
          document.querySelector(".splash-wrapper").style.display = "none";
          document.body.style.overflow = "auto";
        }
      });
    }, { passive: false });

    window.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', function(e) {
      const touchEndY = e.changedTouches[0].clientY;
      const diff = touchStartY - touchEndY;
        gsap.to("#HookText img", {  /* hook text */
          opacity: 1,
          y: 0,
          duration: 0.5,
          stagger: 0.1,
          delay: 0.7
        });
      if (diff > 50) {
        if (scrolled) return;
        scrolled = true;
        
        gsap.to(".rect", {
          padding: "200vh 0vw",
          left: "2vw",
          right: "2vw",
          opacity: 0.83,
          borderColor: "rgba(255,255,255,0)",
          duration: 1,
          backgroundColor: "rgba(0, 0, 0, 0.873)",
          ease: "power2.inOut"
        });
        gsap.to(".icon", { opacity: 0, duration: 0.5 });
        gsap.to(".NavRect", { top: "0vh", padding: "3vh 14vw", opacity: 1, duration: 1.3 });
        gsap.to(".navbar a", { opacity: 1, y: -8, duration: 0.5, stagger: 0.1, delay: 0.7 });
        gsap.to(".splash-wrapper", {
          y: -window.innerHeight,
          duration: 2,
          ease: "power2.inOut",
          onComplete: function() {
            document.querySelector(".splash-wrapper").style.display = "none";
            document.body.style.overflow = "auto";
          }
        });
      }
    }, { passive: true });

    document.body.style.overflow = "hidden";

  </script>

  <script src="main.js"></script>
</body>
</html>
